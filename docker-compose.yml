services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: discriminador
      POSTGRES_USER: discriminador
      POSTGRES_PASSWORD: discriminador
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U discriminador"]
      interval: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    env_file: .env.docker
    environment:
      DATABASE_URL: postgres://discriminador:discriminador@db:5432/discriminador
      UPLOAD_DIR: /app/uploads
      UPLOAD_MAX_FILE_MB: "100"
      VISUAL_MAX_SLIDES: "60"
      VISUAL_SLIDE_MODEL: "claude-sonnet-4-6"
      VISUAL_MARKDOWN_MODEL: "claude-sonnet-4-6"
      VISUAL_SLIDE_CONCURRENCY: "3"
      VISUAL_LLM_TIMEOUT_MS: "60000"
    volumes:
      - uploads_data:/app/uploads

volumes:
  pgdata:
  uploads_data:
